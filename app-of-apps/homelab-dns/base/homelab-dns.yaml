apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/han-steve/homelab.git
    targetRevision: HEAD
    path: infrastructure/homelab-dns
  destination:
    server: https://kubernetes.default.svc
    namespace: homelab-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
