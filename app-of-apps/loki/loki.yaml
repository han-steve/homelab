---
# ArgoCD Application: Loki + Promtail logging stack
# Deploys to host cluster monitoring namespace
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-logging
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: "infrastructure/loki"
spec:
  project: default
  source:
    repoURL: 'https://github.com/han-steve/homelab.git'
    targetRevision: HEAD
    path: infrastructure/loki
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: false  # Manual sync — Loki is new, verify before auto-healing
      prune: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
