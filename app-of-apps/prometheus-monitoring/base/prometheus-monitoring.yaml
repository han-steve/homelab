apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-monitoring
  annotations:
    argocd.argoproj.io/manifest-generate-paths: "prometheus-monitoring"
spec:
  project: default
  source:
    repoURL: 'https://github.com/han-steve/homelab.git'
    targetRevision: HEAD
    path: prometheus-monitoring
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: false  # Manual sync only — prevents ArgoCD disrupting running Prometheus
      prune: false     # Never auto-prune resources
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
