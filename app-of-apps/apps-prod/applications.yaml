---
# ArgoCD Application: Actual Budget → HOST cluster (not vcluster — data already migrated there)
# Note: actual-budget data was migrated from GPU node to host-cluster PVC.
# Keeping on host cluster until a full vcluster migration with data copy is planned.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actual-budget-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/han-steve/homelab'
    targetRevision: HEAD
    path: apps/actual-budget
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: actual-budget
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# ArgoCD Application: APITable → vcluster-prod
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apitable-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/han-steve/homelab'
    targetRevision: HEAD
    path: apps/apitable
  destination:
    server: 'https://prod.vc-prod.svc.cluster.local'
    namespace: apitable
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
        - /stringData
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---
# ArgoCD Application: Jellyfin → vcluster-prod
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/han-steve/homelab'
    targetRevision: HEAD
    path: infrastructure/jellyfin
  destination:
    server: 'https://prod.vc-prod.svc.cluster.local'
    namespace: jellyfin
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# NOTE: Monitoring (Prometheus/Grafana) is managed by app-of-apps/prometheus-monitoring/
# which deploys to path: prometheus-monitoring on the host cluster.
# See app-of-apps/prometheus-monitoring/base/prometheus-monitoring.yaml
