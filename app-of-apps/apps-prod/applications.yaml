---
# ArgoCD Application: Actual Budget → vcluster-prod
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actual-budget-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/han-steve/homelab'
    targetRevision: HEAD
    path: apps/actual-budget
  destination:
    server: 'https://prod.vc-prod.svc.cluster.local'
    namespace: actual-budget
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
