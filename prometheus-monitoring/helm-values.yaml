# Minimal Helm values for kube-prometheus-stack
# Only includes changes from default configuration

grafana:
  adminPassword: homelab2024
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: longhorn

prometheus:
  prometheusSpec:
    # Extended retention (default is 24h) 
    retention: 90d
    retentionSize: 90GB
    
    # Add persistent storage (not in default)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi