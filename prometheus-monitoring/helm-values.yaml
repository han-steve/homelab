# Minimal Helm values for kube-prometheus-stack
# Only includes changes from default configuration

grafana:
    # Deploy manually: kubectl patch secret prometheus-grafana -n monitoring --type='json' \
  #   -p='[{"op":"replace","path":"/data/admin-password","value":"'$(printf '<PASSWORD>' | base64)'"}]'
  adminPassword: PLACEHOLDER_DEPLOY_MANUALLY
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: longhorn
  # Enable default dashboards for CPU/memory/disk/network history
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

prometheus:
  prometheusSpec:
    # 30d retention for standard metrics (CPU, memory, disk, network)
    # Shorter than 90d to save space — 30d is plenty for trend analysis
    retention: 30d
    retentionSize: 50GB
    
    # Scrape interval: 30s for standard system metrics (reduces cardinality vs 15s default)
    scrapeInterval: "30s"
    evaluationInterval: "30s"
    
    # Add persistent storage (not in default)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi

# Node exporter for host-level CPU/memory/disk/network metrics
prometheus-node-exporter:
  enabled: true
  hostRootFsMount:
    enabled: true
    mountPropagation: HostToContainer

# kube-state-metrics for workload metrics
kube-state-metrics:
  enabled: true