apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# Create monitoring namespace
resources:
- namespace.yaml
# NOTE: local-path-storageclass.yaml and prometheus-pv.yaml are kept for reference
# but not included — Prometheus uses Longhorn (storageClassName: longhorn) via
# PersistentVolumeClaim in helm-values.yaml, which Longhorn provisions dynamically.

# Use Helm chart with our custom values
helmCharts:
- name: kube-prometheus-stack
  repo: https://prometheus-community.github.io/helm-charts
  version: "85.3.3"  # Running version — matches helm release prometheus rev1
  releaseName: prometheus
  namespace: monitoring
  valuesFile: helm-values.yaml
  includeCRDs: true