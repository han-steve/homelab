# NOTE: This PersistentVolume is from the original NUC-to-M2 migration and is
# no longer applied (see kustomization.yaml). Prometheus now uses Longhorn for
# dynamic storage provisioning (storageClassName: longhorn in helm-values.yaml).
#
# Kept for historical reference. The original Prometheus TSDB data was stored at
# /home/stevehan/k8s-storage/prometheus on the NUC (steve-homelab, 192.168.1.100)
# and was migrated to Longhorn PVC via the migration bridge pods.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-storage
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath:
    path: /home/stevehan/k8s-storage/prometheus
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - m2  # M2 control-plane node (was: steve-homelab on NUC)