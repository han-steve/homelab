apiVersion: v1
kind: ConfigMap
metadata:
  name: simplefin-exporter-script
  namespace: monitoring
  labels:
    app.kubernetes.io/name: simplefin-exporter
    app.kubernetes.io/component: financial-exporter
data:
  exporter.py: |
    #!/usr/bin/env python3
    """SimpleFIN Bridge Exporter — fetches account balances and serves Prometheus metrics.

    Runs as a K8s CronJob. On first run, exchanges the setup token for an access URL
    and stores it back in the simplefin-config K8s secret. Subsequent runs use the
    stored access URL directly. Serves metrics on :8000 for 5 minutes (Prometheus
    scrapes via ServiceMonitor during this window).
    """
    import os, json, base64, time
    import urllib.request, urllib.error, urllib.parse
    from http.server import HTTPServer, BaseHTTPRequestHandler

    SETUP_TOKEN  = os.environ.get('SIMPLEFIN_SETUP_TOKEN', '')
    SECRET_NAME  = 'simplefin-config'
    NAMESPACE    = 'monitoring'
    SERVE_SECS   = 300  # 5 minutes for Prometheus to scrape

    # Load account name mappings from ConfigMap (optional)
    ACCOUNT_NAMES = {}
    try:
        with open('/etc/account-mappings/account-mappings.json') as f:
            for m in json.load(f).get('mappings', []):
                ACCOUNT_NAMES[m['account_id']] = m.get('custom_name', '')
        print(f"Loaded {len(ACCOUNT_NAMES)} account name mappings")
    except Exception as e:
        print(f"No account mappings (will use raw names): {e}")


    # ── K8s API helpers ─────────────────────────────────────────────────────────

    def k8s_token():
        return open('/var/run/secrets/kubernetes.io/serviceaccount/token').read()

    def k8s_host():
        h = os.environ.get('KUBERNETES_SERVICE_HOST', 'kubernetes.default.svc')
        p = os.environ.get('KUBERNETES_SERVICE_PORT', '443')
        return f"https://{h}:{p}"

    def k8s_ca():
        return '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'

    def k8s_get_secret():
        import ssl
        ctx = ssl.create_default_context(cafile=k8s_ca())
        url = f"{k8s_host()}/api/v1/namespaces/{NAMESPACE}/secrets/{SECRET_NAME}"
        req = urllib.request.Request(url, headers={'Authorization': f'Bearer {k8s_token()}'})
        with urllib.request.urlopen(req, context=ctx) as r:
            return json.loads(r.read())

    def k8s_patch_secret(data_patch):
        import ssl
        ctx = ssl.create_default_context(cafile=k8s_ca())
        url = f"{k8s_host()}/api/v1/namespaces/{NAMESPACE}/secrets/{SECRET_NAME}"
        body = json.dumps({'data': data_patch}).encode()
        req = urllib.request.Request(
            url, data=body, method='PATCH',
            headers={
                'Authorization': f'Bearer {k8s_token()}',
                'Content-Type': 'application/strategic-merge-patch+json',
            }
        )
        with urllib.request.urlopen(req, context=ctx) as r:
            return json.loads(r.read())


    # ── SimpleFIN helpers ────────────────────────────────────────────────────────

    def get_access_url():
        """Return stored access URL from secret, or exchange setup token for one."""
        try:
            secret = k8s_get_secret()
            encoded = secret.get('data', {}).get('access-url', '')
            if encoded:
                print("Using stored access-url from K8s secret")
                return base64.b64decode(encoded).decode().strip()
        except Exception as e:
            print(f"Could not read stored access-url: {e}")

        if not SETUP_TOKEN:
            raise RuntimeError("No SIMPLEFIN_SETUP_TOKEN and no stored access-url")

        # Exchange claim URL for access credentials (one-time)
        claim_url = base64.b64decode(SETUP_TOKEN + '==').decode().strip()
        print(f"Claiming access URL (one-time exchange)...")
        req = urllib.request.Request(claim_url, data=b'', method='POST',
                                     headers={'User-Agent': 'simplefin-exporter/1.0'})
        with urllib.request.urlopen(req) as r:
            access_url = r.read().decode().strip()
        print("Obtained access URL successfully")

        # Store it back in the K8s secret so we don't claim again
        try:
            encoded = base64.b64encode(access_url.encode()).decode()
            k8s_patch_secret({'access-url': encoded})
            print("Stored access-url in K8s secret for future runs")
        except Exception as e:
            print(f"Warning: could not persist access-url: {e}")

        return access_url

    def fetch_accounts(access_url):
        """Fetch accounts from SimpleFIN bridge."""
        parsed = urllib.parse.urlparse(access_url)
        base = f"{parsed.scheme}://{parsed.hostname}{parsed.path}"
        creds = base64.b64encode(f"{parsed.username}:{parsed.password}".encode()).decode()
        params = urllib.parse.urlencode({'start-date': str(int(time.time()) - 86400 * 7)})
        req = urllib.request.Request(
            f"{base}/accounts?{params}",
            headers={
                'Authorization': f'Basic {creds}',
                'User-Agent': 'simplefin-exporter/1.0',
            }
        )
        with urllib.request.urlopen(req) as r:
            return json.loads(r.read())


    # ── Collect metrics ──────────────────────────────────────────────────────────

    lines = [
        '# HELP simplefin_balance Current account balance in account currency',
        '# TYPE simplefin_balance gauge',
        '# HELP simplefin_available_balance Available (liquid) account balance',
        '# TYPE simplefin_available_balance gauge',
    ]

    try:
        access_url = get_access_url()
        data = fetch_accounts(access_url)
        accounts = data.get('accounts', [])
        print(f"Fetched {len(accounts)} accounts from SimpleFIN")
        for acct in accounts:
            acc_id   = acct.get('id', '')
            name     = ACCOUNT_NAMES.get(acc_id, acct.get('name', acc_id)).replace('"', "'")
            org      = acct.get('org', {}).get('name', '').replace('"', "'")
            currency = acct.get('currency', 'USD')
            balance  = acct.get('balance', 0)
            avail    = acct.get('available-balance', balance)
            lbl = f'account_id="{acc_id}",name="{name}",org="{org}",currency="{currency}"'
            lines.append(f'simplefin_balance{{{lbl}}} {balance}')
            lines.append(f'simplefin_available_balance{{{lbl}}} {avail}')
    except Exception as e:
        print(f"ERROR fetching SimpleFIN data: {e}")
        lines.append(f'# ERROR: {e}')

    METRICS_BODY = ('\n'.join(lines) + '\n').encode()


    # ── Serve metrics ────────────────────────────────────────────────────────────

    class MetricsHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            self.send_response(200)
            self.send_header('Content-Type', 'text/plain; version=0.0.4; charset=utf-8')
            self.end_headers()
            self.wfile.write(METRICS_BODY)
        def log_message(self, fmt, *args):
            pass  # Silence per-request logs

    print(f"Serving metrics on :8000 for {SERVE_SECS}s (Prometheus will scrape via ServiceMonitor)...")
    server = HTTPServer(('', 8000), MetricsHandler)
    server.timeout = 1
    deadline = time.time() + SERVE_SECS
    while time.time() < deadline:
        server.handle_request()
    print("Metric serving window closed. Job complete.")
