apiVersion: batch/v1
kind: CronJob
metadata:
  name: simplefin-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: simplefin-exporter
    app.kubernetes.io/component: financial-exporter
spec:
  schedule: "0 6 * * *"  # Run daily at 6 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: simplefin-exporter
            app.kubernetes.io/component: financial-exporter
        spec:
          restartPolicy: OnFailure
          serviceAccountName: simplefin-exporter
          containers:
          - name: simplefin-exporter
            # Uses python:3.11-slim with urllib (no pip needed — stdlib only).
            # Script is mounted from simplefin-exporter-script ConfigMap.
            image: python:3.11-slim
            imagePullPolicy: IfNotPresent
            command: ["python3", "/etc/simplefin/exporter.py"]
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SIMPLEFIN_SETUP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: simplefin-config
                  key: setup-token
            ports:
            - containerPort: 8000
              name: metrics
            volumeMounts:
            - name: exporter-script
              mountPath: /etc/simplefin
              readOnly: true
            - name: account-mappings
              mountPath: /etc/account-mappings
              readOnly: true
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
          volumes:
          - name: exporter-script
            configMap:
              name: simplefin-exporter-script
              defaultMode: 0755
          - name: account-mappings
            configMap:
              name: simplefin-account-mappings
              optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: simplefin-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: simplefin-exporter
    app.kubernetes.io/component: financial-exporter
spec:
  ports:
  - port: 8000
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: simplefin-exporter
    app.kubernetes.io/component: financial-exporter