# Loki helm values — single-binary mode for single-node homelab
# Chart: grafana/loki v6.55.0 (Loki 3.6.7)

# deploymentMode must be top-level (not nested under loki:)
deploymentMode: SingleBinary

loki:
  commonConfig:
    replication_factor: 1

  auth_enabled: false

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# Disable distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable MinIO (use filesystem)
minio:
  enabled: false

# Disable gateway (not needed for single-node)
gateway:
  enabled: false

# Promtail deployed separately
promtail:
  enabled: false
