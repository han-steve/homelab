---
# Restic backup password secret
# IMPORTANT: Change this password before deploying to production!
# Generate: openssl rand -base64 32
# Then: kubectl create secret generic restic-password -n backup \
#         --from-literal=password=YOUR_PASSWORD
apiVersion: v1
kind: Secret
metadata:
  name: restic-password
  namespace: backup
  labels:
    app.kubernetes.io/name: restic-backup
type: Opaque
stringData:
  # This is a placeholder — override with a real random password
  password: "CHANGE_ME_BEFORE_DEPLOYING"
