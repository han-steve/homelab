---
# MinIO deployment — S3-compatible backup target for Longhorn
# Data stored on: Longhorn PVC (local, until GPU node 2TB NVMe is available)
#
# MIGRATION PATH when GPU node joins with 2TB NVMe:
# 1. Add GPU node to Longhorn with disk label "backup-storage"
# 2. Create StorageClass with nodeSelector for GPU node
# 3. Recreate minio-data PVC on the GPU node storage class
# 4. Restore MinIO data via restic/rsync
# 5. Update Longhorn backup target URL (already persistent in longhorn-system settings)
#
# Longhorn backup target (set via Longhorn UI or backup-target-secret):
#   URL: s3://longhorn-backups@minio/
#   Region: minio
#   Endpoint: http://minio.backup.svc.cluster.local:9000
apiVersion: v1
kind: Namespace
metadata:
  name: backup
  labels:
    app.kubernetes.io/name: backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: backup
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi  # Sized for critical PVC backups: actual-budget(5G) + grafana(10G) + extras
      # Expand to GPU node 2TB NVMe when it joins the cluster
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: backup
  labels:
    app.kubernetes.io/name: minio
type: Opaque
stringData:
  # Deploy manually: kubectl create secret generic minio-credentials -n backup \
  #   --from-literal=MINIO_ROOT_USER='<USER>' --from-literal=MINIO_ROOT_PASSWORD='<PASS>'
  MINIO_ROOT_USER: "PLACEHOLDER_DEPLOY_MANUALLY"
  MINIO_ROOT_PASSWORD: "PLACEHOLDER_DEPLOY_MANUALLY"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: backup
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      containers:
      - name: minio
        image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        command: ["/usr/bin/minio", "server", "/data", "--console-address", ":9001"]
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_PASSWORD
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 15
          periodSeconds: 15
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: backup
  labels:
    app.kubernetes.io/name: minio
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
