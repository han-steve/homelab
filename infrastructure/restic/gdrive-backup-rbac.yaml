---
# RBAC for cross-namespace backup access
# Allows backup job to exec into pods in other namespaces
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gdrive-backup
  namespace: backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gdrive-backup
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gdrive-backup
subjects:
- kind: ServiceAccount
  name: gdrive-backup
  namespace: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gdrive-backup
