---
# Google Drive backup via rclone
# Uses kubectl exec to extract data from pods in other namespaces,
# then rclone to upload compressed archives to Google Drive.
#
# Prerequisites:
#   1. Configure rclone locally: rclone config (remote name: google_drive)
#   2. Create rclone config secret:
#      kubectl create secret generic rclone-config -n backup \
#        --from-file=rclone.conf=$HOME/.config/rclone/rclone.conf
#
# Backs up: actual-budget, grafana, jellyfin-config, home-assistant, ocis, apitable-mysql
# Destination: google_drive:homelab-backups/<timestamp>/
# Schedule: 4 AM daily | Retention: 7 daily backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gdrive-backup
  namespace: backup
  labels:
    app.kubernetes.io/name: gdrive-backup
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gdrive-backup
        spec:
          serviceAccountName: gdrive-backup
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
          - name: fetch-kubectl
            image: alpine:3.20
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: false
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl > /dev/null 2>&1
              curl -sLo /tools/kubectl "https://dl.k8s.io/release/v1.32.4/bin/linux/amd64/kubectl"
              chmod +x /tools/kubectl
              echo "kubectl downloaded OK"
            volumeMounts:
            - name: tools
              mountPath: /tools
          containers:
          - name: backup
            image: rclone/rclone:1.74.2
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: false
            command:
            - /bin/sh
            - -c
            - |
              set -e
              export PATH="/tools:$PATH"
              TIMESTAMP=$(date +%Y-%m-%d_%H%M)
              BACKUP_DIR="/tmp/backups/$TIMESTAMP"
              GDRIVE_PATH="homelab-backups"
              mkdir -p "$BACKUP_DIR"

              echo "=== Google Drive Backup Starting $TIMESTAMP ==="
              echo "rclone: $(rclone version | head -1)"
              echo "kubectl: $(kubectl version --client --short 2>/dev/null || kubectl version --client)"
              export RCLONE_CONFIG=/rclone-config/rclone.conf

              # Verify rclone connectivity
              rclone about google_drive: --json 2>/dev/null && echo "Google Drive OK" || {
                echo "ERROR: Cannot connect to Google Drive"; exit 1
              }

              # Backup targets: namespace|label|container|path|name
              FAILED=0
              backup_one() {
                ns="$1"; selector="$2"; container="$3"; path="$4"; name="$5"
                echo ""
                echo "--- Backing up $name (ns=$ns) ---"
                POD=$(kubectl get pods -n "$ns" -l "$selector" \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                if [ -z "$POD" ]; then
                  echo "WARNING: No pod for $name. Skipping."
                  return 1
                fi
                echo "Pod: $POD"
                kubectl exec -n "$ns" "$POD" -c "$container" -- \
                  tar czf - -C "$(dirname "$path")" "$(basename "$path")" \
                  > "$BACKUP_DIR/${name}.tar.gz" 2>/dev/null
                if [ $? -eq 0 ] && [ -s "$BACKUP_DIR/${name}.tar.gz" ]; then
                  SIZE=$(du -sh "$BACKUP_DIR/${name}.tar.gz" | cut -f1)
                  echo "OK: $name ($SIZE)"
                  return 0
                else
                  echo "WARNING: Failed to backup $name"
                  rm -f "$BACKUP_DIR/${name}.tar.gz"
                  return 1
                fi
              }

              backup_one actual-budget app=actual-budget actual-budget /data actual-budget || FAILED=$((FAILED + 1))
              backup_one monitoring app.kubernetes.io/name=grafana grafana /var/lib/grafana grafana || FAILED=$((FAILED + 1))
              backup_one jellyfin app=jellyfin jellyfin /config jellyfin-config || FAILED=$((FAILED + 1))
              backup_one home-assistant app=home-assistant home-assistant /config home-assistant || FAILED=$((FAILED + 1))
              backup_one ocis app=ocis ocis /var/lib/ocis ocis-data || FAILED=$((FAILED + 1))
              backup_one ocis app=ocis ocis /etc/ocis ocis-config || FAILED=$((FAILED + 1))

              echo ""
              echo "--- Backing up apitable-mysql (mysqldump) ---"
              MYSQL_POD=$(kubectl get pods -n apitable -l app=apitable-mysql \
                -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
              if [ -z "$MYSQL_POD" ]; then
                echo "WARNING: No apitable-mysql pod found. Skipping."
                FAILED=$((FAILED + 1))
              else
                echo "Pod: $MYSQL_POD"
                kubectl exec -n apitable "$MYSQL_POD" -c mysql -- \
                  sh -c 'mysqldump -uroot -p"$MYSQL_ROOT_PASSWORD" --single-transaction --routines --triggers apitable' \
                  | gzip > "$BACKUP_DIR/apitable-mysql.sql.gz" 2>/dev/null
                if [ $? -eq 0 ] && [ -s "$BACKUP_DIR/apitable-mysql.sql.gz" ]; then
                  SIZE=$(du -sh "$BACKUP_DIR/apitable-mysql.sql.gz" | cut -f1)
                  echo "OK: apitable-mysql ($SIZE)"
                else
                  echo "WARNING: Failed to dump apitable-mysql"
                  rm -f "$BACKUP_DIR/apitable-mysql.sql.gz"
                  FAILED=$((FAILED + 1))
                fi
              fi

              echo ""
              echo "=== Uploading to Google Drive ==="
              rclone copy "$BACKUP_DIR" "google_drive:$GDRIVE_PATH/$TIMESTAMP/" \
                --progress --stats-one-line

              echo ""
              echo "=== Pruning old backups (keep 7) ==="
              rclone lsd "google_drive:$GDRIVE_PATH/" 2>/dev/null \
                | awk '{print $NF}' | sort | head -n -7 \
                | while read -r dir; do
                    echo "Removing: $dir"
                    rclone purge "google_drive:$GDRIVE_PATH/$dir/" || true
                  done

              echo ""
              echo "=== Current backups ==="
              rclone lsd "google_drive:$GDRIVE_PATH/" 2>/dev/null || echo "(none)"

              echo ""
              echo "=== Backup complete $(date) ==="
              [ $FAILED -gt 0 ] && echo "WARNING: $FAILED failed" && exit 1
              exit 0
            volumeMounts:
            - name: rclone-config
              mountPath: /rclone-config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: tools
              mountPath: /tools
              readOnly: true
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                memory: 1Gi
          volumes:
          - name: rclone-config
            secret:
              secretName: rclone-config
          - name: tmp
            emptyDir:
              sizeLimit: 5Gi
          - name: tools
            emptyDir:
              sizeLimit: 100Mi
