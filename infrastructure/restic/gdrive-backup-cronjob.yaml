---
# Restic backup to Google Drive via rclone
# Prerequisites:
#   1. Run `rclone config` locally to set up Google Drive remote named "gdrive"
#   2. Copy the rclone.conf to a K8s secret:
#      kubectl create secret generic rclone-config -n backup \
#        --from-file=rclone.conf=$HOME/.config/rclone/rclone.conf
#   3. Create restic password secret:
#      kubectl create secret generic restic-password -n backup \
#        --from-literal=password=$(openssl rand -base64 32)
#
# Backs up: actual-budget, grafana, jellyfin-config, home-assistant-config
# Repository: rclone:gdrive:homelab-backups/restic
# Schedule: 4 AM daily
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gdrive-backup
  namespace: backup
  labels:
    app.kubernetes.io/name: gdrive-backup
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gdrive-backup
        spec:
          restartPolicy: OnFailure
          initContainers:
          - name: init-repo
            image: lobaro/restic-backup-docker:1.4.0
            command:
            - sh
            - -c
            - |
              # Initialize restic repository if it doesn't exist
              if ! restic snapshots > /dev/null 2>&1; then
                echo "Initializing restic repository on Google Drive..."
                restic init
                echo "Repository initialized"
              else
                echo "Repository already initialized"
              fi
            env:
            - name: RESTIC_REPOSITORY
              value: rclone:gdrive:homelab-backups/restic
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restic-password
                  key: password
            - name: RCLONE_CONFIG
              value: /rclone-config/rclone.conf
            volumeMounts:
            - name: rclone-config
              mountPath: /rclone-config
              readOnly: true
          containers:
          - name: backup
            image: lobaro/restic-backup-docker:1.4.0
            command:
            - sh
            - -c
            - |
              set -e
              echo "=== Google Drive backup starting $(date) ==="

              for dir in actual-budget grafana jellyfin-config home-assistant; do
                if [ -d "/data/$dir" ]; then
                  echo "--- Backing up $dir ---"
                  restic backup "/data/$dir" \
                    --tag "$dir" \
                    --tag "$(date +%Y-%m-%d)" \
                    --exclude='*.tmp' \
                    --exclude='*.log' \
                    --verbose
                fi
              done

              echo "=== Pruning old snapshots ==="
              restic forget \
                --keep-daily 7 \
                --keep-weekly 4 \
                --keep-monthly 12 \
                --prune --verbose

              echo "=== Current snapshots ==="
              restic snapshots

              echo "=== Backup complete $(date) ==="
            env:
            - name: RESTIC_REPOSITORY
              value: rclone:gdrive:homelab-backups/restic
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restic-password
                  key: password
            - name: RCLONE_CONFIG
              value: /rclone-config/rclone.conf
            volumeMounts:
            - name: rclone-config
              mountPath: /rclone-config
              readOnly: true
            - name: actual-budget-data
              mountPath: /data/actual-budget
              readOnly: true
            - name: grafana-data
              mountPath: /data/grafana
              readOnly: true
            - name: jellyfin-config
              mountPath: /data/jellyfin-config
              readOnly: true
            - name: ha-config
              mountPath: /data/home-assistant
              readOnly: true
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                memory: 1Gi
          volumes:
          - name: rclone-config
            secret:
              secretName: rclone-config
          - name: actual-budget-data
            persistentVolumeClaim:
              claimName: actual-budget-data
          - name: grafana-data
            persistentVolumeClaim:
              claimName: prometheus-grafana
          - name: jellyfin-config
            persistentVolumeClaim:
              claimName: jellyfin-config
          - name: ha-config
            persistentVolumeClaim:
              claimName: home-assistant-config
