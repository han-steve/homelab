---
# Google Drive backup via rclone
# Uses kubectl exec to extract data from pods in other namespaces,
# then rclone to upload compressed archives to Google Drive.
#
# Prerequisites:
#   1. Configure rclone locally: rclone config (remote name: google_drive)
#   2. Create rclone config secret:
#      kubectl create secret generic rclone-config -n backup \
#        --from-file=rclone.conf=$HOME/.config/rclone/rclone.conf
#
# Backs up: actual-budget, grafana, jellyfin-config, home-assistant
# Destination: google_drive:homelab-backups/<timestamp>/
# Schedule: 4 AM daily | Retention: 7 daily backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gdrive-backup
  namespace: backup
  labels:
    app.kubernetes.io/name: gdrive-backup
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gdrive-backup
        spec:
          serviceAccountName: gdrive-backup
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: bitnami/kubectl:1.36.0
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              TIMESTAMP=$(date +%Y-%m-%d_%H%M)
              BACKUP_DIR="/tmp/backups/$TIMESTAMP"
              GDRIVE_PATH="homelab-backups"
              mkdir -p "$BACKUP_DIR"

              echo "=== Google Drive Backup Starting $TIMESTAMP ==="

              # Install rclone
              echo "--- Installing rclone ---"
              curl -sL https://rclone.org/install.sh | bash > /dev/null 2>&1
              export RCLONE_CONFIG=/rclone-config/rclone.conf

              # Verify rclone connectivity
              rclone about google_drive: --json 2>/dev/null && echo "Google Drive OK" || {
                echo "ERROR: Cannot connect to Google Drive"; exit 1
              }

              # Backup targets: namespace|label|container|path|name
              TARGETS=(
                "actual-budget|app=actual-budget|actual-budget|/data|actual-budget"
                "monitoring|app.kubernetes.io/name=grafana|grafana|/var/lib/grafana|grafana"
                "jellyfin|app=jellyfin|jellyfin|/config|jellyfin-config"
                "home-assistant|app=home-assistant|home-assistant|/config|home-assistant"
              )

              FAILED=0
              for target in "${TARGETS[@]}"; do
                IFS='|' read -r ns selector container path name <<< "$target"
                echo ""
                echo "--- Backing up $name (ns=$ns) ---"

                POD=$(kubectl get pods -n "$ns" -l "$selector" \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                if [ -z "$POD" ]; then
                  echo "WARNING: No pod for $name. Skipping."
                  FAILED=$((FAILED + 1))
                  continue
                fi
                echo "Pod: $POD"

                kubectl exec -n "$ns" "$POD" -c "$container" -- \
                  tar czf - -C "$(dirname "$path")" "$(basename "$path")" \
                  > "$BACKUP_DIR/${name}.tar.gz" 2>/dev/null || {
                  echo "WARNING: Failed to backup $name"
                  rm -f "$BACKUP_DIR/${name}.tar.gz"
                  FAILED=$((FAILED + 1))
                  continue
                }
                SIZE=$(du -sh "$BACKUP_DIR/${name}.tar.gz" | cut -f1)
                echo "OK: $name ($SIZE)"
              done

              echo ""
              echo "=== Uploading to Google Drive ==="
              rclone copy "$BACKUP_DIR" "google_drive:$GDRIVE_PATH/$TIMESTAMP/" \
                --progress --stats-one-line

              echo ""
              echo "=== Pruning old backups (keep 7) ==="
              rclone lsd "google_drive:$GDRIVE_PATH/" 2>/dev/null \
                | awk '{print $NF}' | sort | head -n -7 \
                | while read -r dir; do
                    echo "Removing: $dir"
                    rclone purge "google_drive:$GDRIVE_PATH/$dir/" || true
                  done

              echo ""
              echo "=== Current backups ==="
              rclone lsd "google_drive:$GDRIVE_PATH/" 2>/dev/null || echo "(none)"

              echo ""
              echo "=== Backup complete $(date) ==="
              [ $FAILED -gt 0 ] && echo "WARNING: $FAILED failed" && exit 1
              exit 0
            volumeMounts:
            - name: rclone-config
              mountPath: /rclone-config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                memory: 1Gi
          volumes:
          - name: rclone-config
            secret:
              secretName: rclone-config
          - name: tmp
            emptyDir:
              sizeLimit: 5Gi
