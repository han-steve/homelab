# cert-manager Certificates for all homelab services
# All issued by homelab-ca ClusterIssuer (trusted via homelab-root-ca)
# Run `bash scripts/trust-local-ca.sh` on Mac/devices to trust all of these.

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: homelab-ca
    kind: ClusterIssuer
  commonName: grafana.homelab
  dnsNames:
    - grafana.homelab
    - grafana.homelab.local
  ipAddresses:
    - 192.168.1.13
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256

