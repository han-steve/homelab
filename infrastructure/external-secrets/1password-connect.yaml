# 1Password Connect Server deployment
# Bootstrap this manually once with the credentials file from 1Password.
# After this, External Secrets Operator pulls all other secrets from 1Password.
#
# Prerequisites:
#   1. Download 1password-credentials.json from 1Password > Integrations > Connect Server
#   2. Create the secret (run once):
#      kubectl create namespace external-secrets
#      kubectl create secret generic onepassword-connect-secret \
#        --namespace external-secrets \
#        --from-file=1password-credentials.json
#   3. kubectl apply -f infrastructure/external-secrets/1password-connect.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onepassword-connect
  template:
    metadata:
      labels:
        app: onepassword-connect
    spec:
      containers:
        - name: connect-api
          image: 1password/connect-api:1.7.3
          ports:
            - containerPort: 8080
          env:
            - name: OP_BUS_PORT
              value: "11220"
            - name: OP_BUS_PEERS
              value: "localhost:11221"
            - name: OP_HTTP_PORT
              value: "8080"
            - name: OP_SESSION
              valueFrom:
                secretKeyRef:
                  name: onepassword-connect-secret
                  key: 1password-credentials.json
          volumeMounts:
            - name: shared-data
              mountPath: /home/opuser/.op/data
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 128Mi
        - name: connect-sync
          image: 1password/connect-sync:1.7.3
          ports:
            - containerPort: 8081
          env:
            - name: OP_HTTP_PORT
              value: "8081"
            - name: OP_BUS_PORT
              value: "11221"
            - name: OP_BUS_PEERS
              value: "localhost:11220"
            - name: OP_SESSION
              valueFrom:
                secretKeyRef:
                  name: onepassword-connect-secret
                  key: 1password-credentials.json
          volumeMounts:
            - name: shared-data
              mountPath: /home/opuser/.op/data
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: onepassword-connect-data
---
apiVersion: v1
kind: Service
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  selector:
    app: onepassword-connect
  ports:
    - name: api
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onepassword-connect-data
  namespace: external-secrets
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
# ClusterSecretStore — the global 1Password source ESO uses for ExternalSecrets
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local:8080
      vaults:
        Homelab: 1     # "Homelab" vault has priority 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-token
            namespace: external-secrets
            key: token
