# Tailscale Operator Helm values
# Chart: tailscale/tailscale-operator
# Docs: https://tailscale.com/kb/1236/kubernetes-operator
#
# PREREQUISITES:
#
# 1. Create an OAuth client in the Tailscale admin console:
#    https://login.tailscale.com/admin/settings/oauth
#    Required scopes:
#      - devices:core:write
#      - routes:read + routes:write
#      - dns:read
#
# 2. Create the K8s secret BEFORE syncing this ArgoCD app:
#    kubectl create namespace tailscale
#    kubectl create secret generic operator-oauth \
#      --namespace tailscale \
#      --from-literal=client_id='<your-oauth-client-id>' \
#      --from-literal=client_secret='<your-oauth-client-secret>'
#
# DIRECT PEER-TO-PEER (no DERP relay):
#
# For lowest latency, forward UDP 41641 on the AT&T BGW320 router to the M2 node:
#   AT&T BGW320 admin UI: http://192.168.254.254
#   Firewall -> NAT/Gaming -> Add custom rule:
#     Protocol: UDP
#     Port range: 41641
#     Device IP: 192.168.1.10 (M2 node)
#
# Even without port forwarding, Tailscale works via DERP fallback.
# Port forwarding only needed for latency-sensitive scenarios (e.g., 4K streaming).
#
# SUBNET ROUTER (LAN access from Tailscale):
#
# After deploying, approve the subnet route in Tailscale admin:
#   https://login.tailscale.com/admin/machines
#   Find "homelab-operator" -> ... -> Edit route settings -> Enable 192.168.1.0/24
#
# This lets Tailscale clients reach all homelab services (192.168.1.11-20) directly.

operatorConfig:
  hostname: homelab-operator

proxyConfig:
  defaultProxyClass: homelab

apiServerProxyConfig:
  mode: "true"

oauth:
  clientId: ""     # Populated from operator-oauth secret (do not put real value here)
  clientSecret: "" # Populated from operator-oauth secret (do not put real value here)
