# Tailscale Operator Helm values
# Chart: tailscale/tailscale-operator
# Docs: https://tailscale.com/kb/1236/kubernetes-operator
#
# в”Ђв”Ђв”Ђ PREREQUISITES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#
# 1. Create an OAuth client in the Tailscale admin console:
#    https://login.tailscale.com/admin/settings/oauth
#    Required scopes:
#      - devices:core:write
#      - routes:read + routes:write
#      - dns:read
#
# 2. Create the K8s secret BEFORE syncing this ArgoCD app:
#    kubectl create namespace tailscale
#    kubectl create secret generic operator-oauth \
#      --namespace tailscale \
#      --from-literal=client_id='<your-oauth-client-id>' \
#      --from-literal=client_secret='<your-oauth-client-secret>'
#
# в”Ђв”Ђв”Ђ DIRECT PEER-TO-PEER (no DERP relay) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ DIRECT PEER-TO-PEER (no DERP relay) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ DIR”Ђ# в”Ђв”Ђв”Ђ DIRECT PEER-TOt NAT t# в”Ђв”Ђв”Ђ DIRECT PEER-TO-PEER (no d # в”Ђв”Ђв”Ђ DIRECT PEER-TO-PEER (no DERP relay) в”Ђв”Ђ DERP # в”Ђв”Ђв”Ђ DIRECT PEER-TO-PEER (no DERP relay) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ DIRECT PEER-TO-PEER (no DERP relay) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ DIR”Ђ# в”Ђв”Ђв”Ђ DIRECT PEER-TOt NAT t# в”Ђвe:
#    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #    #     Int#    #    #    #      #    #    #    #    #    #sc#    #    #    #    #    #    #   ns#    #    #    #1.10#    #    #    #    #    #    #    #    #    #    #    #-...]            (relay)
#
#   Note: Even without port forwarding, Tailscale works via DERP fallback.
#   Port forwarding only needed for latency-sensitive scenarios.
#
# в”Ђв”Ђв”Ђ SUBNET ROUTER (LAN access from Tailscale) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ SUBNET ROUTER (LAN access from Tailscale) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ SUBNET ROUTER (LAN access from Tailscale) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ SUBNET ROUTER (LAN access from Tailscale) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ SUBNET ROUTER (LAN access from Tailscale) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ SUBNET ROUTER (LAN access from Tailscale) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”# в”Ђв”Ђв”Ђ SUBNET ROUTER (LAN access from Tailscale) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”tProxyClass: homelab

apiServerProxyConfig:
  mode: "true"

oauth:
  clientId: ""   # Populated from operator-oauth secret (do not put real value here)
  clientSecret: "" # Populated from operator-oauth secret (do not put real value here)
