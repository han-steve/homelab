apiVersion: v1
kind: Secret
metadata:
  name: tailscale-operator
  namespace: tailscale
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  # Deploy manually:
  # 1. Generate an OAuth client at https://login.tailscale.com/admin/settings/oauth
  #    with "Devices: Write" and "Auth Keys: Write" scopes
  # 2. kubectl create secret generic tailscale-operator -n tailscale \
  #      --from-literal=client_id='<OAUTH_CLIENT_ID>' \
  #      --from-literal=client_secret='<OAUTH_CLIENT_SECRET>'
  client_id: "PLACEHOLDER_DEPLOY_MANUALLY"
  client_secret: "PLACEHOLDER_DEPLOY_MANUALLY"
