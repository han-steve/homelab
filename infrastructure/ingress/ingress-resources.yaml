# Homelab Ingress Resources
# All services exposed via nginx-ingress at 192.168.1.21
# TLS terminated at nginx using wildcard cert *.homelab
#
# DNS: All *.homelab / *.homelab.local → 192.168.1.21 (nginx-ingress)
# Exception: direct IP access still works for all services
#
# Service map:
#   jellyfin.homelab      → jellyfin/jellyfin:8096             (HTTP backend)
#   grafana.homelab       → monitoring/prometheus-grafana:80   (HTTP backend)
#   prometheus.homelab    → monitoring/prometheus-kube-prometheus-prometheus:9090
#   alertmanager.homelab  → monitoring/prometheus-kube-prometheus-alertmanager:9093
#   longhorn.homelab      → longhorn-system/longhorn-frontend:80
#   minio.homelab         → backup/minio:9001                  (MinIO console)
#   argocd.homelab        → argocd/argocd-server:80            (HTTP backend, --insecure)
#   apitable.homelab      → apitable/apitable-gateway:80       (HTTP backend)
#   budget.homelab        → actual-budget/actual-budget:5006   (HTTPS backend)
#   ocis.homelab          → ocis/ocis:9200                     (HTTPS backend)

---
# Jellyfin — Media Server
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: jellyfin
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"      # unlimited for media uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jellyfin.homelab
        - jellyfin.homelab.local
      secretName: jellyfin-tls
  rules:
    - host: jellyfin.homelab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
    - host: jellyfin.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096

