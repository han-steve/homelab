# Prometheus — Metrics & Alerting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # Basic auth recommended for production — skip for homelab
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prometheus.homelab
        - prom.homelab
      secretName: prometheus-tls
  rules:
    - host: prometheus.homelab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-prometheus
                port:
                  number: 9090
    - host: prom.homelab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-prometheus
                port:
                  number: 9090

