apiVersion: v1
kind: Service
metadata:
  name: prometheus-grafana-lb
  namespace: monitoring
  annotations:
    lbipam.cilium.io/ips: "192.168.1.13"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: prometheus
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-lb
  namespace: argocd
  annotations:
    lbipam.cilium.io/ips: "192.168.1.14"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
