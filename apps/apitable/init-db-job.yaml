apiVersion: batch/v1
kind: Job
metadata:
  name: apitable-init-db
  namespace: apitable
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z apitable-mysql 3306; do
                echo "waiting for mysql..."; sleep 3
              done
              echo "mysql ready"
      containers:
        - name: init-db
          image: apitable/init-db:latest
          env:
            # All naming variants the init-db image might check
            - name: DB_HOST
              value: "apitable-mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "apitable"
            - name: DB_USERNAME
              value: "apitable"
            - name: DB_USER
              value: "apitable"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apitable-db-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_HOST
              value: "apitable-mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: "apitable"
            - name: MYSQL_USERNAME
              value: "apitable"
            - name: MYSQL_USER
              value: "apitable"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apitable-db-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
