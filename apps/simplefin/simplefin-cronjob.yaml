apiVersion: batch/v1
kind: CronJob
metadata:
  name: simplefin-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: simplefin-exporter
spec:
  schedule: "0 6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: simplefin-exporter
        spec:
          restartPolicy: OnFailure
          # NOTE: For production use, rebuild the custom image:
          #   Source: ~/repos/simplefin-bridge-exporter-modified/ (was on old server)
          #   The custom image adds: K8s secret persistence, account ID labels, account name mappings
          #   Until then, this uses the upstream image which works for a single-run setup-token claim.
          containers:
            - name: simplefin-exporter
              image: eduser25/simplefin-bridge-exporter:latest
              imagePullPolicy: IfNotPresent
              args:
                - -setupToken
                - $(SIMPLEFIN_SETUP_TOKEN)
                - -updateInterval
                - 5m
              env:
                - name: SIMPLEFIN_SETUP_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: simplefin-config
                      key: setup-token
              ports:
                - containerPort: 8080
                  name: metrics
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: simplefin-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: simplefin-exporter
spec:
  ports:
    - port: 8080
      targetPort: metrics
      name: metrics
  selector:
    app.kubernetes.io/name: simplefin-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: simplefin-exporter
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: simplefin-exporter
  endpoints:
    - port: metrics
      interval: 30s
