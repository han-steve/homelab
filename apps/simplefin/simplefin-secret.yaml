apiVersion: v1
kind: Secret
metadata:
  name: simplefin-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: simplefin-exporter
type: Opaque
stringData:
  # Replace with your actual SimpleFIN setup token from:
  # https://app.simplefin.org/simplefin/bridge → "Add Data"
  # The setup token can only be claimed once — after first successful run,
  # the access URL is stored in this same secret under the "access-url" key.
  setup-token: "REPLACE_WITH_YOUR_SIMPLEFIN_SETUP_TOKEN"
  # access-url: "" # populated automatically after first run (if using custom image)
