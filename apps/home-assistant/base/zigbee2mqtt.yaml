---
# Zigbee2MQTT - bridges Zigbee devices to MQTT
apiVersion: v1
kind: ConfigMap
metadata:
  name: zigbee2mqtt-config
  namespace: home-assistant
data:
  configuration.yaml: |
    homeassistant: true
    permit_join: true
    mqtt:
      base_topic: zigbee2mqtt
      server: mqtt://mosquitto.home-assistant.svc.cluster.local:1883
    serial:
      port: /dev/ttyUSB0
      adapter: ember
    frontend:
      port: 8080
    advanced:
      log_level: info
      network_key: GENERATE
      pan_id: GENERATE
      ext_pan_id: GENERATE
      channel: 11
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: home-assistant
  labels:
    app: zigbee2mqtt
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zigbee2mqtt
  template:
    metadata:
      labels:
        app: zigbee2mqtt
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.37.0
          command: ['sh', '-c', 'if [ ! -f /app/data/configuration.yaml ]; then cp /config/configuration.yaml /app/data/configuration.yaml; fi']
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /config
      containers:
        - name: zigbee2mqtt
          image: koenkk/zigbee2mqtt:2.10.1
          ports:
            - containerPort: 8080
              name: frontend
          env:
            - name: TZ
              value: America/Los_Angeles
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: zigbee-device
              mountPath: /dev/ttyUSB0
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zigbee2mqtt-data
        - name: config
          configMap:
            name: zigbee2mqtt-config
        - name: zigbee-device
          hostPath:
            path: /dev/ttyUSB0
            type: CharDevice
---
apiVersion: v1
kind: Service
metadata:
  name: zigbee2mqtt
  namespace: home-assistant
spec:
  selector:
    app: zigbee2mqtt
  ports:
    - port: 8080
      targetPort: 8080
      name: frontend
