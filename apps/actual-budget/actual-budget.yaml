apiVersion: v1
kind: Namespace
metadata:
  name: actual-budget
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-budget-data
  namespace: actual-budget
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-budget
  namespace: actual-budget
  labels:
    app: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: actual-budget
          image: actualbudget/actual-server:26.5.2
          ports:
            - containerPort: 5006
              name: https
          env:
            - name: ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB
              value: "20"
            - name: ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB
              value: "50"
            - name: ACTUAL_HTTPS_KEY
              valueFrom:
                secretKeyRef:
                  name: actual-budget-tls
                  key: tls.key
            - name: ACTUAL_HTTPS_CERT
              valueFrom:
                secretKeyRef:
                  name: actual-budget-tls
                  key: tls.crt
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 5006
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5006
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actual-budget-data
---
apiVersion: v1
kind: Service
metadata:
  name: actual-budget
  namespace: actual-budget
  annotations:
    lbipam.cilium.io/ips: "192.168.1.12"
spec:
  type: LoadBalancer
  selector:
    app: actual-budget
  ports:
    - name: https
      port: 5006
      targetPort: 5006
