# Patch applied to ALL nodes (both controlplane and worker).
# Keep this to settings that are universal across the cluster.
machine:
  time:
    disabled: false
    servers:
      - time.cloudflare.com   # Cloudflare NTP — low latency, accurate
      - pool.ntp.org

  # Kernel parameters required for Cilium, Longhorn, and general workloads
  sysctls:
    net.core.somaxconn: "65535"
    net.core.netdev_max_backlog: "4096"
    net.ipv4.ip_local_port_range: "1024 65535"
    net.ipv4.tcp_tw_reuse: "1"
    vm.max_map_count: "262144"            # Needed if Elasticsearch/OpenSearch ever runs
    fs.inotify.max_user_watches: "524288" # Prevent inotify exhaustion (ArgoCD, Longhorn)
    fs.inotify.max_user_instances: "512"

  features:
    # Enable XFS project quotas on ephemeral partition — kubelet can track disk usage per pod
    diskQuotaSupport: true
    # KubePrism: local API server proxy so Cilium (kube-proxy replacement) can find the API
    kubePrism:
      enabled: true
      port: 7445
    # Host DNS resolver — resolves cluster member hostnames on the host
    # forwardKubeDNSToHost=false avoids known Cilium bpf.masquerade + CoreDNS breakage
    hostDNS:
      enabled: true
      resolveMemberNames: true
      forwardKubeDNSToHost: false

  # Containerd tuning: allow unprivileged ports/ICMP inside containers (needed by some apps)
  files:
    - path: /etc/cri/conf.d/20-customization.part
      op: create
      permissions: 0o666
      content: |
        [plugins."io.containerd.grpc.v1.cri"]
          enable_unprivileged_ports = true
          enable_unprivileged_icmp = true
        [plugins."io.containerd.grpc.v1.cri".containerd]
          discard_unpacked_layers = false

  kubelet:
    # Rotate kubelet server certificates (required for proper kubectl exec/logs)
    extraConfig:
      serverTLSBootstrap: true
    # Disable static pod manifests directory (security: use machine config pods instead)
    disableManifestsDirectory: true
    # Enable container runtime seccomp profiles by default
    defaultRuntimeSeccompProfileEnabled: true
    # Pin kubelet node IP to the LAN subnet — avoids picking up container IPs
    nodeIP:
      validSubnets:
        - 192.168.1.0/24   # Confirmed LAN subnet. Gateway is 192.168.1.254.

  # Node labels applied at kubelet registration
  nodeLabels:
    topology.kubernetes.io/region: homelab
    topology.kubernetes.io/zone: local
    # Longhorn: auto-create default disk on this node at /var/lib/longhorn
    node.longhorn.io/create-default-disk: "true"
